<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Interface</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #030712;
            color: #00f0ff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
        }
        .header {
            text-align: center;
            padding: 15px;
            background: linear-gradient(to bottom, rgba(0,240,255,0.1), transparent);
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }
        .arc-reactor {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px dashed #00f0ff;
            margin: 5px auto;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }
        .chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
        }
        .user-msg {
            background-color: #0284c7;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .jarvis-msg {
            background-color: #1e293b;
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.3);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .sys-log {
            font-family: monospace;
            font-size: 11px;
            color: #22c55e;
            text-align: center;
            background: rgba(34, 197, 94, 0.05);
            padding: 4px;
        }
        .input-panel {
            background-color: #0f172a;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(0, 240, 255, 0.2);
        }
        .text-input {
            flex-grow: 1;
            background-color: #1e293b;
            border: 1px solid #38bdf8;
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .mic-btn {
            background-color: #0284c7;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(2, 132, 199, 0.5);
        }
        .mic-btn.listening {
            background-color: #ef4444;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 15px #ef4444;
        }
        .send-btn {
            background: transparent;
            border: 1px solid #34d399;
            color: #34d399;
            padding: 12px 18px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="arc-reactor">J.A.R.V.I.S</div>
        <small style="color: #64748b; letter-spacing: 2px;">ACCESSIBILITY AI LINK</small>
    </div>

    <div id="hiddenTrigger" style="display:none; color:transparent; width:1px; height:1px;">kazi</div>
    <div class="sys-log" id="statusDisplay">JARVIS CORES ONLINE</div>

    <div class="chat-container" id="chatBoard">
        <div class="message jarvis-msg">
            Mambo vipi mkuu Muslimu? Mifumo ipo tayari. Unaweza kuchat nami au kubonyeza Mic unipe amri ya sauti!
        </div>
    </div>

    <div class="input-panel">
        <input type="text" class="text-input" id="userInput" placeholder="Andika ujumbe au amri hapa...">
        <button class="send-btn" onclick="tumaUjumbeMeneja()">Tuma</button>
        
        <button class="mic-btn" id="micButton" onclick="anzishaSautiNative()" aria-label="Ongea na Jarvis">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
                <line x1="12" x2="12" y1="19" y2="22"></line>
            </svg>
        </button>
    </div>

    <script src="capacitor.js"></script>
    <script>
        const chatBoard = document.getElementById('chatBoard');
        const userInput = document.getElementById('userInput');
        const micButton = document.getElementById('micButton');
        const hiddenTrigger = document.getElementById('hiddenTrigger');
        const statusDisplay = document.getElementById('statusDisplay');

        function ongeaJarvis(maandishi) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Zima sauti ya nyuma kwanza
                const speech = new SpeechSynthesisUtterance(maandishi);
                speech.lang = 'sw-TZ'; 
                speech.rate = 1.0;
                window.speechSynthesis.speak(speech);
            }
        }

        function wekaChat(ujumbe, mtumaji) {
            const div = document.createElement('div');
            div.className = `message ${mtumaji === 'user' ? 'user-msg' : 'jarvis-msg'}`;
            div.innerText = ujumbe;
            chatBoard.appendChild(div);
            chatBoard.scrollTop = chatBoard.scrollHeight;
        }

        function chambuaAmri(amri) {
            let amriSafi = amri.toLowerCase().trim();
            
            if (amriSafi.includes("washa wifi")) {
                hiddenTrigger.innerText = "washa wifi"; 
                statusDisplay.innerText = "COMMAND SENT: [WASHA WIFI]";
                setTimeout(() => {
                    wekaChat("Nimeshaamsha amri kwenye mfumo, WiFi inawaka sasa hivi boss.", "jarvis");
                    ongeaJarvis("Nimeelewa mkuu, nawasha wifi sasa hivi.");
                }, 800);
            } 
            else if (amriSafi.includes("zima wifi")) {
                hiddenTrigger.innerText = "zima wifi"; 
                statusDisplay.innerText = "COMMAND SENT: [ZIMA WIFI]";
                setTimeout(() => {
                    wekaChat("Amri imetekelezwa. WiFi imezimwa kikamilifu.", "jarvis");
                    ongeaJarvis("Tayari mkuu, nimezima wifi.");
                }, 800);
            } 
            else {
                setTimeout(() => {
                    let jibu = "Amri yako imepokelewa mkuu Muslimu. Kwa sasa ninaweza kudhibiti mifumo ya simu kama 'washa wifi' au 'zima wifi'.";
                    wekaChat(jibu, "jarvis");
                    ongeaJarvis("Sawa mkuu.");
                }, 800);
            }
        }

        // Ilitengenezwa upya kuzuia kosa la uandishi la mwanzo
        function tumaUjumbeMeneja() {
            const text = userInput.value;
            if (!text.trim()) return;
            wekaChat(text, 'user');
            userInput.value = '';
            chambuaAmri(text);
        }

        // MFUMO MPYA WA MIC (Kutumia Capacitor Native Speech Recognition)
        async function anzishaSautiNative() {
            try {
                // Kuangalia kama Plugin ya Capacitor ipo tayari kwenye simu
                if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SpeechRecognition) {
                    const SpeechRecognition = window.Capacitor.Plugins.SpeechRecognition;
                    
                    // Omba ruhusa ya Mic kwenye simu yako ya Android
                    const permission = await SpeechRecognition.requestPermission();
                    if (!permission.permission) {
                        statusDisplay.innerText = "MIC PERMISSION DENIED";
                        return;
                    }

                    micButton.classList.add('listening');
                    statusDisplay.innerText = "JARVIS LISTENING (NATIVE)...";

                    // Anzisha usikilizaji wa lugha ya Kiswahili ya Tanzania
                    SpeechRecognition.start({
                        language: "sw-TZ",
                        maxResults: 1,
                        prompt: "Ongea na JARVIS...",
                        partialResults: false
                    }).then((result) => {
                        micButton.classList.remove('listening');
                        if (result matches && result.matches.length > 0) {
                            const kasema = result.matches[0];
                            wekaChat(kasema, 'user');
                            chambuaAmri(kasema);
                        }
                    }).catch((err) => {
                        micButton.classList.remove('listening');
                        statusDisplay.innerText = "VOICE ERROR. TRY AGAIN.";
                        console.error(err);
                    });

                } else {
                    // Mfumo wa dharura wa Web Recognition kama ikirun kwenye browser ya kawaida
                    statusDisplay.innerText = "FALLBACK TO WEB MIC...";
                    const WebRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!WebRecognition) {
                        statusDisplay.innerText = "SPEECH NOT SUPPORTED ON THIS DEVICE";
                        return;
                    }
                    const rec = new WebRecognition();
                    rec.lang = 'sw-TZ';
                    rec.onstart = () => micButton.classList.add('listening');
                    rec.onend = () => micButton.classList.remove('listening');
                    rec.onerror = () => statusDisplay.innerText = "VOICE ERROR. TRY AGAIN.";
                    rec.onresult = (e) => {
                        const txt = e.results[0][0].transcript;
                        wekaChat(txt, 'user');
                        chambuaAmri(txt);
                    };
                    rec.start();
                }
            } catch (error) {
                micButton.classList.remove('listening');
                statusDisplay.innerText = "CRITICAL MIC ERROR.";
                console.error(error);
            }
        }

        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                tumaUjumbeMeneja();
            }
        });
    </script>
</body>
</html>
